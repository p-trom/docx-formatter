services:
  - type: web
    name: docx-formatter-api
    runtime: python
    region: frankfurt
    plan: free
    branch: main
    buildCommand: pip install -e .
    startCommand: |
      python -m uvicorn docx_formatter.api.main:app --host 0.0.0.0 --port $PORT --workers 1 --access-log
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MAX_FILE_SIZE_MB
        value: 16
    healthCheckPath: /health
    autoDeploy: true
